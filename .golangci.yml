# SPDX-License-Identifier: AGPL-3.0-or-later
run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused        # dead-code / unused identifiers
    - misspell
    - revive
    - gocritic
    - gosec
    - bodyclose
    - nilerr
    - errorlint
    - unconvert
    - copyloopvar

linters-settings:
  revive:
    rules:
      - name: exported
        disabled: false
  gocritic:
    enabled-tags: [diagnostic, style, performance]
    # The event-sourcing core passes the immutable eventlog.Envelope (and read
    # models) by value on purpose — events are values, not shared pointers. The
    # by-value idiom is mandated by the Projector.Apply interface, so these
    # size/style nits would fire pervasively and add only noise.
    disabled-checks: [hugeParam, rangeValCopy, unnamedResult]

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters: [gosec, errcheck]
