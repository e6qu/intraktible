apiVersion: v1
kind: Service
metadata:
  name: {{ include "intraktible.fullname" . }}
  labels: {{- include "intraktible.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "intraktible.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    intraktible.dev/tier: api
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: 8080
