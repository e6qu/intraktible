{{- if .Values.scheduler.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "intraktible.fullname" . }}-scheduler
  labels: {{- include "intraktible.labels" . | nindent 4 }}
spec:
  # SINGLETON: the timed monitor/model-drift/deploy/SLA sweeps are not leader-elected
  # (the deploy sweep is claim-guarded; the alert sweeps are not), so exactly one
  # replica runs them. Do not scale this above 1 without adding leader election.
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "intraktible.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      intraktible.dev/tier: scheduler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "intraktible.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        intraktible.dev/tier: scheduler
    spec:
      serviceAccountName: {{ include "intraktible.fullname" . }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: intraktible
          image: {{ include "intraktible.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["serve", "--addr=:8080", "--data-dir=/data", "--store={{ .Values.store }}", "--log={{ .Values.log }}"]
          ports:
            - { name: http, containerPort: 8080 }
          envFrom:
            - secretRef: { name: {{ include "intraktible.secretName" . }} }
          env:
            {{- range $k, $v := .Values.env }}
            - { name: {{ $k }}, value: {{ $v | quote }} }
            {{- end }}
            - { name: INTRAKTIBLE_MONITOR_INTERVAL, value: {{ .Values.scheduler.monitorInterval | quote }} }
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
          resources: {{- toYaml .Values.scheduler.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: data, mountPath: /data }
      volumes:
        - name: data
          emptyDir: {}
{{- end }}
