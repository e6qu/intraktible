# Monolith profile (default): one container runs all modules — `docker compose up`.
# Split profile: one container per module — `docker compose --profile split up`.
# Postgres profile (future durable projection store): `docker compose --profile pg up`.
#
# The same image runs every module; `serve --modules=<name>` selects which one.
# Split profile: every module service shares ONE data volume and runs with
# `--log=sqlite --store=sqlite`, so all processes append to and read from a single
# ordered event log (and a single projection store) — the cross-component flows
# that travel through the log (escalation manual_review → Case Manager, and the
# Rule/Connect/AI nodes that read another layer) work across processes. The shared
# SQLite log replaces the single-process file WAL for this topology (D18).
services:
  intraktible:
    build:
      context: ..
      dockerfile: Dockerfile
    image: intraktible:dev
    ports: ["8080:8080"]
    volumes: ["itk-data:/data"]

  # --- split profile: one service per module (same image, different --modules) ---
  # All split services share itk-split:/data so the sqlite log + store are shared.
  decision-engine:
    image: intraktible:dev
    profiles: ["split"]
    command: ["--modules=decision-engine", "--log=sqlite", "--store=sqlite"]
    ports: ["8081:8080"]
    volumes: ["itk-split:/data"]
  case-manager:
    image: intraktible:dev
    profiles: ["split"]
    command: ["--modules=case-manager", "--log=sqlite", "--store=sqlite"]
    ports: ["8082:8080"]
    volumes: ["itk-split:/data"]
  context-layer:
    image: intraktible:dev
    profiles: ["split"]
    command: ["--modules=context-layer", "--log=sqlite", "--store=sqlite"]
    ports: ["8083:8080"]
    volumes: ["itk-split:/data"]
  agent-manager:
    image: intraktible:dev
    profiles: ["split"]
    command: ["--modules=agent-manager", "--log=sqlite", "--store=sqlite"]
    ports: ["8084:8080"]
    volumes: ["itk-split:/data"]

  postgres:
    image: postgres:17-alpine   # PostgreSQL License (AGPL-compatible)
    profiles: ["pg"]
    environment:
      POSTGRES_PASSWORD: intraktible
      POSTGRES_DB: intraktible
    ports: ["5432:5432"]
    volumes: ["pg-data:/var/lib/postgresql/data"]

volumes:
  itk-data: {}
  itk-split: {}
  pg-data: {}
