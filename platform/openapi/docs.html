<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>intraktible API reference</title>
    <style>
      :root {
        color-scheme: light dark;
        --fg: #1a1d24;
        --muted: #6b7280;
        --border: #e4e7ec;
        --bg: #fff;
        --accent: #4f46e5;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --fg: #e6e8ee;
          --muted: #98a0b3;
          --border: #2a2f3a;
          --bg: #14171d;
          --accent: #8b93f8;
        }
      }
      body {
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          sans-serif;
        color: var(--fg);
        background: var(--bg);
        margin: 0;
        line-height: 1.5;
      }
      main {
        max-width: 56rem;
        margin: 0 auto;
        padding: 2rem 1.25rem 4rem;
      }
      h1 {
        margin: 0 0 0.2rem;
      }
      .sub {
        color: var(--muted);
        margin: 0 0 1.5rem;
      }
      .sub a {
        color: var(--accent);
      }
      .tag {
        font-size: 1.1rem;
        margin: 1.6rem 0 0.4rem;
        border-bottom: 1px solid var(--border);
        padding-bottom: 0.3rem;
      }
      .op {
        display: flex;
        align-items: baseline;
        gap: 0.6rem;
        padding: 0.5rem 0;
        border-bottom: 1px solid var(--border);
      }
      .method {
        font:
          600 0.72rem ui-monospace,
          monospace;
        text-transform: uppercase;
        padding: 0.15rem 0.45rem;
        border-radius: 6px;
        color: #fff;
        flex: none;
        min-width: 3.2rem;
        text-align: center;
      }
      .get {
        background: #2563eb;
      }
      .post {
        background: #16a34a;
      }
      .put {
        background: #d97706;
      }
      .delete {
        background: #dc2626;
      }
      .path {
        font:
          0.85rem ui-monospace,
          monospace;
      }
      .summary {
        color: var(--muted);
        font-size: 0.9rem;
      }
      .err {
        color: #dc2626;
      }
      code {
        font:
          0.85rem ui-monospace,
          monospace;
        background: color-mix(in srgb, var(--muted) 18%, transparent);
        padding: 0.05rem 0.3rem;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1 id="title">API reference</h1>
      <p class="sub" id="sub">
        Loading the contract from <a href="/openapi.json">/openapi.json</a>…
      </p>
      <div id="ops"></div>
    </main>
    <script type="module">
      const METHODS = ['get', 'post', 'put', 'patch', 'delete'];
      try {
        const res = await fetch('/openapi.json');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const doc = await res.json();
        document.getElementById('title').textContent = doc.info?.title ?? 'API reference';
        document.getElementById('sub').innerHTML =
          'v' +
          (doc.info?.version ?? '?') +
          ' — authenticate with the <code>X-Api-Key</code> header. Machine-readable: ' +
          '<a href="/openapi.json">/openapi.json</a>.';
        // Group operations by their first tag, preserving the document's tag order.
        const order = (doc.tags ?? []).map((t) => t.name);
        const groups = new Map();
        for (const [path, item] of Object.entries(doc.paths ?? {})) {
          for (const method of METHODS) {
            const op = item[method];
            if (!op) continue;
            const tag = (op.tags && op.tags[0]) || 'other';
            if (!groups.has(tag)) groups.set(tag, []);
            groups.get(tag).push({ method, path, summary: op.summary ?? '' });
          }
        }
        const tags = [...groups.keys()].sort((a, b) => {
          const ia = order.indexOf(a),
            ib = order.indexOf(b);
          return (ia < 0 ? 99 : ia) - (ib < 0 ? 99 : ib);
        });
        const root = document.getElementById('ops');
        for (const tag of tags) {
          const h = document.createElement('h2');
          h.className = 'tag';
          h.textContent = tag;
          root.appendChild(h);
          for (const op of groups.get(tag)) {
            const row = document.createElement('div');
            row.className = 'op';
            const m = document.createElement('span');
            m.className = 'method ' + op.method;
            m.textContent = op.method;
            const p = document.createElement('span');
            p.className = 'path';
            p.textContent = op.path;
            const s = document.createElement('span');
            s.className = 'summary';
            s.textContent = op.summary;
            row.append(m, p, s);
            root.appendChild(row);
          }
        }
      } catch (e) {
        document.getElementById('sub').innerHTML =
          '<span class="err">Could not load /openapi.json: ' + e.message + '</span>';
      }
    </script>
  </body>
</html>
