<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Inline SVG favicon (the layered-stack brand mark): avoids a /favicon.ico request
         that 404s under the base-path deploy. -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230f766e'/%3E%3Cpath d='M16 7l8 4-8 4-8-4 8-4z' fill='%23fff' opacity='.95'/%3E%3Cpath d='M8 16l8 4 8-4M8 20l8 4 8-4' stroke='%23fff' stroke-width='1.6' fill='none' opacity='.7'/%3E%3C/svg%3E"
    />
    <script>
      // Apply the saved/OS theme before first paint to avoid a flash of the
      // wrong colours (mirrors lib/theme.ts).
      try {
        var t = localStorage.getItem('intraktible-theme');
        if (t !== 'light' && t !== 'dark') {
          t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
