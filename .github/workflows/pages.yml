# SPDX-License-Identifier: AGPL-3.0-or-later
# Builds and deploys the public GitHub Pages site. The site is assembled so the
# interactive demo lives at /demo/ and a docs placeholder at /docs/, leaving the
# root (/) free for a future presentation page (a versioned placeholder for now).
# Pages publishes one artifact, so all three paths are assembled into _site here.
#
# Requires the repo's Pages source to be set to "GitHub Actions" (Settings → Pages).
name: pages
on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'pages/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Allow the deploy job to publish to Pages via OIDC; read-only on the repo otherwise.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer push supersedes an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: install
        working-directory: web
        run: npm ci
      - name: install Playwright browser
        working-directory: web
        run: npx playwright install --with-deps chromium
      # Builds the demo (BASE_PATH=/demo, VITE_DEMO=true) and smoke-tests it against
      # the in-browser mock backend. The build output (web/build) persists for the
      # assembly step below, so this both gates and produces the artifact.
      - name: build + smoke-test demo
        working-directory: web
        run: npx playwright test --config=playwright.demo.config.ts
      # Render the Markdown docs (README + docs/*.md) into the static /docs/ site.
      - name: build docs site
        working-directory: web
        run: npm run build:docs
      - name: assemble site (/demo, /docs, root)
        run: |
          rm -rf _site && mkdir -p _site/demo
          cp -r web/build/. _site/demo/
          # SPA fallback: GitHub Pages serves 404.html for unknown paths, so a deep
          # link like /demo/engine boots the app instead of 404-ing.
          cp web/build/index.html _site/demo/404.html
          cp -r web/build-docs _site/docs
          cp pages/index.html _site/index.html
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
