# SPDX-License-Identifier: AGPL-3.0-or-later
# Builds and deploys the public GitHub Pages site. The site is assembled so the
# interactive demo lives at /demo/ and a docs placeholder at /docs/, leaving the
# root (/) free for a future presentation page (a versioned placeholder for now).
# Pages publishes one artifact, so all three paths are assembled into _site here.
#
# Requires the repo's Pages source to be set to "GitHub Actions" (Settings → Pages).
name: pages
on:
  push:
    branches: [main]
    # The demo is the REAL backend compiled to wasm (make wasm) + the UI + seeded data —
    # the SAME engine production runs natively. So the demo must rebuild whenever that
    # engine changes, not only on web/ changes. A denylist (rebuild on anything EXCEPT
    # what provably can't affect the demo or the rendered docs) can't silently drift the
    # way the old web/**-only allowlist did when backend Go code changed.
    paths-ignore:
      - 'deploy/**' # the terraform module can't affect the demo or docs
  workflow_dispatch:

# Allow the deploy job to publish to Pages via OIDC; read-only on the repo otherwise.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer push supersedes an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: install
        working-directory: web
        run: npm ci
      - name: install Playwright browser
        working-directory: web
        run: npx playwright install --with-deps chromium
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: build the wasm backend + seed history
        run: make wasm demo-seed
      # Builds the demo (BASE_PATH=/demo, VITE_DEMO=true) and smoke-tests it against
      # the REAL backend compiled to wasm. The build output (web/build) persists for
      # the assembly step below, so this both gates and produces the artifact.
      - name: build + smoke-test demo
        working-directory: web
        run: npx playwright test --config=playwright.demo.config.ts
      # Render the Markdown docs (README + docs/*.md) into the static /docs/ site.
      - name: build docs site
        working-directory: web
        run: npm run build:docs
      - name: assemble site (/demo, /docs, root)
        run: |
          rm -rf _site && mkdir -p _site/demo
          cp -r web/build/. _site/demo/
          # SPA fallback for deep dynamic links (e.g. /demo/cases/case_1, /demo/decisions/
          # dec_1) that aren't prerendered to a static .html. GitHub Pages serves the
          # custom 404 page ONLY from the site ROOT, not per-directory — so the demo shell
          # must live at _site/404.html (a _site/demo/404.html is never consulted for
          # /demo/* misses). The shell's base is /intraktible/demo, so it boots and client-
          # routes correctly. Keep the demo-local copy too; it's harmless.
          cp web/build/index.html _site/404.html
          cp web/build/index.html _site/demo/404.html
          cp -r web/build-docs _site/docs
          cp pages/index.html _site/index.html
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  # Smoke the LIVE deployed demo — the check the local build test can't do. Catches a
  # broken deploy (base paths, missing assets) AND a returning visitor with an
  # incompatible saved session; fails the workflow so a bad demo deploy is loud.
  live-smoke:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: install
        working-directory: web
        run: npm ci
      - name: install Playwright browser
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: smoke the live demo (fresh + returning visitor)
        working-directory: web
        run: node scripts/live-demo-smoke.mjs "https://e6qu.github.io/intraktible/demo/"
