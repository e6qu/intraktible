# SPDX-License-Identifier: AGPL-3.0-or-later
name: Release container

on:
  push:
    branches: [main]

concurrency:
  group: release-container
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/e6qu/intraktible

jobs:
  contract:
    timeout-minutes: 15
    name: Validate publication contract
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate immutable tags and retention
        run: |
          shellcheck scripts/check-container-publication.sh scripts/prune-ghcr-images.sh scripts/test-container-retention.sh
          ./scripts/check-container-publication.sh

  metadata:
    timeout-minutes: 15
    name: Resolve immutable tag
    needs: contract
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.revision.outputs.tag }}
    steps:
      - id: revision
        env:
          REVISION: ${{ github.sha }}
        run: |
          tag="${REVISION:0:12}"
          if [[ ! "$tag" =~ ^[0-9a-f]{12}$ ]]; then
            echo "invalid immutable image tag: $tag" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  build:
    timeout-minutes: 15
    name: Build (${{ matrix.arch }})
    needs: metadata
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish architecture image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          sbom: false
          tags: ${{ env.IMAGE }}:${{ needs.metadata.outputs.tag }}-${{ matrix.arch }}
          build-args: |
            GIT_SHA=${{ needs.metadata.outputs.tag }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha,scope=intraktible-${{ matrix.arch }}
          cache-to: type=gha,scope=intraktible-${{ matrix.arch }},mode=max

  manifest:
    timeout-minutes: 15
    name: Publish multi-architecture manifest
    needs: [metadata, build]
    runs-on: ubuntu-24.04
    steps:
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Assemble multi-architecture manifest
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE}:${{ needs.metadata.outputs.tag }}" \
            "${IMAGE}:${{ needs.metadata.outputs.tag }}-amd64" \
            "${IMAGE}:${{ needs.metadata.outputs.tag }}-arm64"

  retention:
    timeout-minutes: 15
    name: Retain 20 release groups
    needs: [metadata, manifest]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Delete obsolete GitHub Container Registry versions
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/prune-ghcr-images.sh "${{ github.repository_owner }}" "${{ github.event.repository.name }}" "${{ needs.metadata.outputs.tag }}" 20
