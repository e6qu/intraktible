# SPDX-License-Identifier: AGPL-3.0-or-later
name: ci
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
      - name: format check
        run: make fmtcheck
      - name: vet
        run: make vet
      - name: typecheck
        run: make typecheck
      - name: test (race)
        run: make test
      - name: lint
        run: make lint
      - name: sast (gosec)
        run: make sast
      - name: dead code
        run: make deadcode
      - name: copy-paste detection
        run: make dupl
      - name: vulnerability scan
        run: make vuln
      - name: license compliance (AGPL-compatible only)
        run: make licenses

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: install
        run: npm ci
      - name: format check (prettier)
        run: npm run format:check
      - name: lint + sast (eslint + security)
        run: npm run lint
      - name: typecheck (svelte-check, strict)
        run: npm run check
      - name: unit tests (vitest)
        run: npm run test:unit
      - name: build
        run: npm run build
      - name: license compliance (web)
        run: npx --yes license-checker --production --onlyAllow "MIT;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;Apache-2.0;MPL-2.0;Unlicense;CC0-1.0"

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: install
        working-directory: web
        run: npm ci
      - name: install Playwright browser
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: e2e (Playwright — all UI flows)
        working-directory: web
        run: npm run test:e2e
