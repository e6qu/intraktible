# SPDX-License-Identifier: AGPL-3.0-or-later
name: ci
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
          cache: true
      - name: format check
        run: make fmtcheck
      - name: vet
        run: make vet
      - name: typecheck
        run: make typecheck
      - name: test (race)
        run: make test
      - name: lint
        run: make lint
      - name: sast (gosec)
        run: make sast
      - name: dead code
        run: make deadcode
      - name: copy-paste detection
        run: make dupl
      - name: vulnerability scan
        run: make vuln
      - name: license compliance (AGPL-compatible only)
        run: make licenses

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: install
        run: npm ci
      - name: format check (prettier)
        run: npm run format:check
      - name: lint + sast (eslint + security)
        run: npm run lint
      - name: typecheck (svelte-check, strict)
        run: npm run check
      - name: unit tests (vitest)
        run: npm run test:unit
      - name: build
        run: npm run build
      - name: license compliance (web)
        run: npx --yes license-checker --production --onlyAllow "MIT;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;Apache-2.0;MPL-2.0;Unlicense;CC0-1.0"

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
          cache: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: install
        working-directory: web
        run: npm ci
      - name: install Playwright browser
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: e2e (Playwright — all UI flows)
        working-directory: web
        run: npm run test:e2e

  # Smoke-tests the server-less GitHub Pages demo (BASE_PATH=/demo, VITE_DEMO=true):
  # the REAL Go backend compiled to wasm boots in a worker from the seed event log,
  # every route renders from it, and writes mutate real projections. Guards the demo
  # on PRs; the `pages` workflow runs the same gate before deploying on main.
  demo:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: install
        run: npm ci
      - name: install Playwright browser
        run: npx playwright install --with-deps chromium
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: build the wasm backend + seed history
        run: make wasm demo-seed
        working-directory: .
      - name: demo smoke (Playwright — the real backend in wasm, no server)
        run: npx playwright test --config=playwright.demo.config.ts
