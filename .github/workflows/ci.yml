# SPDX-License-Identifier: AGPL-3.0-or-later
name: ci
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  terraform:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.0
        with:
          terraform_version: 1.13.5
      - name: Amazon Elastic Container Service Terraform contract
        run: make terraform-check

  container-release:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Bounded workflow jobs
        run: ./scripts/check-workflow-timeouts.sh
      - name: Immutable multi-architecture publication contract
        run: make container-release-check

  go:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: format check
        run: make fmtcheck
      - name: vet
        run: make vet
      - name: typecheck
        run: make typecheck
      - name: test (race)
        run: make test
      - name: lint
        run: make lint
      - name: sast (gosec)
        run: make sast
      - name: dead code
        run: make deadcode
      - name: copy-paste detection
        run: make dupl
      - name: vulnerability scan
        run: make vuln
      - name: license compliance (AGPL-compatible only)
        run: make licenses

  # The durable-Postgres path (store, event log, and the multi-replica projection
  # single-writer test) against a real PostgreSQL. These tests skip when
  # INTRAKTIBLE_TEST_POSTGRES is unset, so the default `go` job stays hermetic; this
  # job supplies a Postgres service so they actually run.
  postgres:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: intraktible
          POSTGRES_DB: intraktible
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      INTRAKTIBLE_TEST_POSTGRES: postgres://postgres:intraktible@localhost:5432/intraktible
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Postgres store / event log / projection tests
        run: go test -race ./platform/store/ ./platform/eventlog/ ./platform/projection/

  web:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: install
        run: npm ci
      - name: format check (prettier)
        run: npm run format:check
      - name: lint + sast (eslint + security)
        run: npm run lint
      - name: typecheck (svelte-check, strict)
        run: npm run check
      - name: unit tests (vitest)
        run: npm run test:unit
      - name: build
        run: npm run build
      - name: license compliance (web)
        run: npx --yes license-checker --production --onlyAllow "MIT;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;Apache-2.0;MPL-2.0;Unlicense;CC0-1.0"

  e2e:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: install
        working-directory: web
        run: npm ci
      - name: install Playwright browser
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: e2e (Playwright — all UI flows)
        working-directory: web
        run: npm run test:e2e

  shauth-sso:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: e6qu/shauth
          ref: 74735a1710fa69d472e7eb27ae95ce317c7c1a3d
          path: .test-deps/shauth
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: install web dependencies
        working-directory: web
        run: npm ci
      - name: install Playwright browser
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: check real-stack harness
        run: shellcheck scripts/test-shauth-sso.sh
      - name: real Shauth SSO contract
        env:
          SHAUTH_SOURCE_DIR: ${{ github.workspace }}/.test-deps/shauth
        run: ./scripts/test-shauth-sso.sh

  # Smoke-tests the server-less GitHub Pages demo (BASE_PATH=/demo, VITE_DEMO=true):
  # the REAL Go backend compiled to wasm boots in a worker from the seed event log,
  # every route renders from it, and writes mutate real projections. Guards the demo
  # on PRs; the `pages` workflow runs the same gate before deploying on main.
  demo:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: install
        run: npm ci
      - name: install Playwright browser
        run: npx playwright install --with-deps chromium
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: build the wasm backend + seed history
        run: make wasm demo-seed
        working-directory: .
      - name: demo smoke (Playwright — the real backend in wasm, no server)
        run: npx playwright test --config=playwright.demo.config.ts
